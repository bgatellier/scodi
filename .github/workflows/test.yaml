name: Tests

on: pull_request

jobs:
  test:
    name: 🐛 Run tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        node_version: [20, 22, 24, 25]

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set Node.js version
        run: sed -Ei 's/(node = ).*/\1"^${{ matrix.node_version}}"/' .prototools

      - name: Setup Moon toolchain
        uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0
        with:
          auto-install: true

      - name: Run tests
        run: moon ci :test
